<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="weather-app">
      <h1>Weather App</h1>
      <p class="subtitle">Search for a city to see the current weather</p>

      <div class="search-section">
        <input type="text" id="cityInput" placeholder="Enter a city name" />
        <button id="searchBtn">Search</button>
      </div>

      <div id="message" class="message">Enter a city to get started</div>

      <div id="weatherCard" class="weather-card hidden">
        <h2 id="cityName">City Name</h2>
        <p id="weatherMain">Weather</p>
        <p id="temperature">Temperature</p>
        <p id="feelsLike">Feels like</p>
        <p id="humidity">Humidity</p>
        <p id="windSpeed">Wind Speed</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
